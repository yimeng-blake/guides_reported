name: Nightly Filing Ingestion

on:
  schedule:
    # 5:30 PM ET (22:30 UTC) — after market close + after-hours filings
    - cron: "30 22 * * 1-5"  # Weekdays only
  workflow_dispatch:  # Allow manual triggers

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion for all watchlist tickers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python ingest.py --all-watchlist
